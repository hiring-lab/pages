<select id="country-select" onchange="switchChart()">
  <option value="FR">France</option>
  <option value="DE">Allemagne</option>
  <option value="IT">Italie</option>
  <option value="GB">Royaume-Uni</option>
  <option value="NL">Pays-Bas</option>
  <option value="IE">Irlande</option>
  <option value="ES">Espagne</option>
</select>
<br>
<img id="chart" src="../fr/transpa_normcat_paytype_FR.png" style="width:100%;max-width:800px">
<script>
function switchChart() {
  var ctry = document.getElementById("country-select").value;
  document.getElementById("chart").src = "../fr/transpa_normcat_paytype_" + ctry + ".png";
}
</script>
